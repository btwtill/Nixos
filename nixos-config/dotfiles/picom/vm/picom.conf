backend = "glx";
vsync = true;

detect-rounded-corners = true;
detect-client-opacity = true;
use-damage = true;

shadow = false;

fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;

inactive-opacity = 0.95;
active-opacity = 1.0;
frame-opacity = 1.0;

corner-radius = 12;

blur:
{
  method = "gaussian";
  size = 10;
  deviation = 5.0;
};

mark-wmwin-focused = true;
mark-ovredir-focused = true;

rounded-corners-exclude = [
  "class_g = 'Qtile'",
];

opacity-rule = [
  "100:class_g = 'Qtile'"
];
